name: Build iLogCat

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-debug:
    runs-on: ubuntu-latest
    name: Build Debug

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libssh2-1-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            code/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Debug
        working-directory: code
        run: cargo build --verbose

      - name: Run tests
        working-directory: code
        run: cargo test --verbose

      - name: Upload debug binary
        uses: actions/upload-artifact@v4
        with:
          name: ilogcat-debug
          path: code/target/debug/ilogcat
          retention-days: 7

  build-release:
    runs-on: ubuntu-latest
    name: Build Release
    needs: build-debug
    if: always() && (needs.build-debug.result == 'success' || needs.build-debug.result == 'skipped')
    container:
      image: ubuntu:22.04
      options: --privileged

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y libgtk-4-dev libssh2-1-dev pkg-config librsvg2-bin curl build-essential

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            code/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Release
        working-directory: code
        run: cargo build --release --verbose

      - name: Get version from Cargo.toml
        id: version
        working-directory: code
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Strip binary
        working-directory: code
        run: strip target/release/ilogcat

      - name: Create release package
        working-directory: code
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p ilogcat-release/usr/bin
          mkdir -p ilogcat-release/usr/share/applications
          mkdir -p ilogcat-release/usr/share/icons/hicolor/256x256/apps
          mkdir -p ilogcat-release/usr/share/icons/hicolor/scalable/apps
          mkdir -p ilogcat-release/DEBIAN

          # Copy binary
          cp target/release/ilogcat ilogcat-release/usr/bin/

          # Convert SVG to PNG icon
          if [ -f assets/ilogcat.svg ]; then
            rsvg-convert -w 256 -h 256 assets/ilogcat.svg > ilogcat-release/usr/share/icons/hicolor/256x256/apps/ilogcat.png
            cp assets/ilogcat.svg ilogcat-release/usr/share/icons/hicolor/scalable/apps/ilogcat.svg
          else
            echo "No SVG icon found, skipping icon generation"
          fi

          # Create desktop entry
          cat > ilogcat-release/usr/share/applications/ilogcat.desktop << EOF
          [Desktop Entry]
          Name=iLogCat
          Comment=Linux Log Viewer inspired by Android Studio Logcat
          Exec=/usr/bin/ilogcat
          Icon=ilogcat
          Terminal=false
          Type=Application
          Categories=System;Monitor;GTK;
          Keywords=log;viewer;monitoring;logcat;
          StartupNotify=true
          EOF

          # Create postinst script to update icon cache
          cat > ilogcat-release/DEBIAN/postinst << 'EOF'
          #!/bin/bash
          gtk4-update-icon-cache -f /usr/share/icons/hicolor/ 2>/dev/null || true
          update-icon-caches /usr/share/icons/hicolor/ 2>/dev/null || true
          EOF
          chmod 755 ilogcat-release/DEBIAN/postinst

          # Create control file for deb package
          cat > ilogcat-release/DEBIAN/control << EOF
          Package: ilogcat
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libgtk-4-1, libssh2-1
          Maintainer: ayukyo
          Description: Linux Log Viewer
           A logcat-like log viewer for Linux, inspired by Android Studio Logcat.
           Supports local system logs, file logs, and remote SSH logs.
          EOF

          # Build deb package
          dpkg-deb --build ilogcat-release
          mv ilogcat-release.deb ilogcat_${VERSION}_amd64.deb

      - name: Prepare artifacts
        working-directory: code
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p ../artifacts
          cp target/release/ilogcat ../artifacts/
          cp ilogcat_${VERSION}_amd64.deb ../artifacts/

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: ilogcat-release
          path: |
            artifacts/ilogcat
            artifacts/ilogcat_${{ steps.version.outputs.version }}_amd64.deb
          retention-days: 30

  create-release:
    runs-on: ubuntu-latest
    name: Create GitHub Release
    needs: build-release
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from Cargo.toml
        id: version
        working-directory: code
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: ilogcat-release
          path: release/

      - name: List downloaded files
        run: |
          echo "Downloaded artifacts:"
          find release/ -type f -ls

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: iLogCat v${{ steps.version.outputs.version }}
          body: |
            ## iLogCat v${{ steps.version.outputs.version }}

            ### Features
            - Multi-tab log windows support
            - SSH remote log viewing with tab completion
            - Command shortcuts sidebar
            - Regex filtering support
            - Custom log level keywords
            - Server time sync for SSH logs

            ### Installation

            #### Debian/Ubuntu (.deb package)
            ```bash
            sudo dpkg -i ilogcat_${{ steps.version.outputs.version }}_amd64.deb
            sudo apt-get install -f  # Install dependencies if needed
            ```

            #### From binary
            ```bash
            chmod +x ilogcat
            sudo cp ilogcat /usr/local/bin/
            ```

            ### System Requirements
            - Linux (Ubuntu 22.04+, Debian 12+)
            - GTK4 runtime libraries
            - libssh2

            ### Usage
            ```bash
            ilogcat
            ```
          files: |
            release/ilogcat
            release/ilogcat_${{ steps.version.outputs.version }}_amd64.deb
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 发布 Docker 镜像到 GitHub Packages
  docker:
    runs-on: ubuntu-latest
    name: Build Docker Image
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ilogcat:latest
            ghcr.io/${{ github.repository_owner }}/ilogcat:${{ steps.version.outputs.version }}