name: Build iLogCat

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-debug:
    runs-on: ubuntu-20.04
    name: Build Debug

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libssh2-1-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            code/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Debug
        working-directory: code
        run: cargo build --verbose

      - name: Run tests
        working-directory: code
        run: cargo test --verbose

      - name: Upload debug binary
        uses: actions/upload-artifact@v4
        with:
          name: ilogcat-debug
          path: code/target/debug/ilogcat
          retention-days: 7

  build-release:
    runs-on: ubuntu-20.04
    name: Build Release
    needs: build-debug

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libssh2-1-dev pkg-config librsvg2-bin

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            code/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Release
        working-directory: code
        run: cargo build --release --verbose

      - name: Strip binary
        working-directory: code
        run: strip target/release/ilogcat

      - name: Create release package
        working-directory: code
        run: |
          mkdir -p ilogcat-release/usr/bin
          mkdir -p ilogcat-release/usr/share/applications
          mkdir -p ilogcat-release/usr/share/icons/hicolor/256x256/apps
          mkdir -p ilogcat-release/usr/share/icons/hicolor/scalable/apps
          mkdir -p ilogcat-release/DEBIAN
          
          # Copy binary
          cp target/release/ilogcat ilogcat-release/usr/bin/
          
          # Convert SVG to PNG icon
          if [ -f assets/ilogcat.svg ]; then
            rsvg-convert -w 256 -h 256 assets/ilogcat.svg > ilogcat-release/usr/share/icons/hicolor/256x256/apps/ilogcat.png
            cp assets/ilogcat.svg ilogcat-release/usr/share/icons/hicolor/scalable/apps/ilogcat.svg
          else
            # Create a simple placeholder icon if SVG doesn't exist
            convert -size 256x256 xc:#2196F3 -gravity center -pointsize 72 -fill white -annotate 0 "iLog" ilogcat-release/usr/share/icons/hicolor/256x256/apps/ilogcat.png 2>/dev/null || \
            echo "" | base64 -d > ilogcat-release/usr/share/icons/hicolor/256x256/apps/ilogcat.png
          fi
          
          # Create desktop entry
          cat > ilogcat-release/usr/share/applications/ilogcat.desktop << 'EOF'
          [Desktop Entry]
          Name=iLogCat
          Comment=Linux Log Viewer inspired by Android Studio Logcat
          Exec=/usr/bin/ilogcat
          Icon=ilogcat
          Terminal=false
          Type=Application
          Categories=System;Monitor;GTK;
          Keywords=log;viewer;monitoring;logcat;
          StartupNotify=true
          EOF
          
          # Create postinst script to update icon cache
          cat > ilogcat-release/DEBIAN/postinst << 'EOF'
          #!/bin/bash
          gtk4-update-icon-cache -f /usr/share/icons/hicolor/ 2>/dev/null || true
          update-icon-caches /usr/share/icons/hicolor/ 2>/dev/null || true
          EOF
          chmod 755 ilogcat-release/DEBIAN/postinst
          
          # Create control file for deb package
          cat > ilogcat-release/DEBIAN/control << EOF
          Package: ilogcat
          Version: 0.2.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libgtk-4-1, libssh2-1
          Maintainer: DevAgent <dev-agent@openclaw.local>
          Description: Linux Log Viewer
           A logcat-like log viewer for Linux, inspired by Android Studio Logcat.
           Supports local system logs, file logs, and remote SSH logs.
          EOF
          
          # Build deb package
          dpkg-deb --build ilogcat-release
          mv ilogcat-release.deb ilogcat_0.2.0_amd64.deb

      - name: Prepare artifacts
        working-directory: code
        run: |
          mkdir -p ../artifacts
          cp target/release/ilogcat ../artifacts/
          cp ilogcat_0.2.0_amd64.deb ../artifacts/

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: ilogcat-release
          path: |
            artifacts/ilogcat
            artifacts/ilogcat_0.2.0_amd64.deb
          retention-days: 30

  create-release:
    runs-on: ubuntu-20.04
    name: Create GitHub Release
    needs: build-release
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: ilogcat-release
          path: release/

      - name: List downloaded files
        run: |
          echo "Downloaded artifacts:"
          find release/ -type f -ls

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v0.2.2
          name: iLogCat v0.2.2
          body: |
            ## iLogCat v0.2.2

            ### Fixes
            - Fixed GLIBC compatibility - now built on Ubuntu 20.04
            - Should work on most Linux distributions now

            ### Features
            - Multi-tab log windows support
            - Custom log level keywords
            - SSH remote command execution
            - Settings export/import

            ### Installation

            #### Debian/Ubuntu (.deb package)
            ```bash
            sudo dpkg -i ilogcat_0.2.0_amd64.deb
            sudo apt-get install -f  # Install dependencies if needed
            ```

            After installation, you can find iLogCat in your application menu.

            #### From binary
            ```bash
            chmod +x ilogcat
            sudo cp ilogcat /usr/local/bin/
            ```

            ### System Requirements
            - Linux (Ubuntu 18.04+, Debian 10+, Fedora 30+)
            - GTK4 runtime libraries
            - libssh2

            ### Usage
            ```bash
            ilogcat
            ```
          files: |
            release/ilogcat
            release/ilogcat_0.2.0_amd64.deb
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
