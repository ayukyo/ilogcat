name: Build iLogCat

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    name: Build and Test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libssh2-1-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        working-directory: code
        run: cargo build --verbose

      - name: Run tests
        working-directory: code
        run: cargo test --verbose

  build-release:
    runs-on: ubuntu-latest
    name: Build Release
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    container:
      image: ubuntu:22.04
      options: --privileged

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y libgtk-4-dev libssh2-1-dev pkg-config librsvg2-bin curl build-essential

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release
        working-directory: code
        run: cargo build --release --verbose

      - name: Get version from Cargo.toml
        id: version
        working-directory: code
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Strip binary
        working-directory: code
        run: strip target/release/ilogcat

      - name: Create release package
        working-directory: code
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p ilogcat-release/usr/bin
          mkdir -p ilogcat-release/usr/share/applications
          mkdir -p ilogcat-release/usr/share/icons/hicolor/256x256/apps
          mkdir -p ilogcat-release/usr/share/icons/hicolor/scalable/apps
          mkdir -p ilogcat-release/DEBIAN

          cp target/release/ilogcat ilogcat-release/usr/bin/

          if [ -f assets/ilogcat.svg ]; then
            rsvg-convert -w 256 -h 256 assets/ilogcat.svg > ilogcat-release/usr/share/icons/hicolor/256x256/apps/ilogcat.png
            cp assets/ilogcat.svg ilogcat-release/usr/share/icons/hicolor/scalable/apps/ilogcat.svg
          fi

          cat > ilogcat-release/usr/share/applications/ilogcat.desktop << EOF
          [Desktop Entry]
          Name=iLogCat
          Comment=Linux Log Viewer inspired by Android Studio Logcat
          Exec=/usr/bin/ilogcat
          Icon=ilogcat
          Terminal=false
          Type=Application
          Categories=System;Monitor;GTK;
          Keywords=log;viewer;monitoring;logcat;
          StartupNotify=true
          EOF

          cat > ilogcat-release/DEBIAN/postinst << 'EOF'
          #!/bin/bash
          gtk4-update-icon-cache -f /usr/share/icons/hicolor/ 2>/dev/null || true
          update-icon-caches /usr/share/icons/hicolor/ 2>/dev/null || true
          EOF
          chmod 755 ilogcat-release/DEBIAN/postinst

          cat > ilogcat-release/DEBIAN/control << EOF
          Package: ilogcat
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libgtk-4-1, libssh2-1
          Maintainer: ayukyo
          Description: Linux Log Viewer
           A logcat-like log viewer for Linux, inspired by Android Studio Logcat.
           Supports local system logs, file logs, and remote SSH logs.
          EOF

          dpkg-deb --build ilogcat-release
          mv ilogcat-release.deb ilogcat_${VERSION}_amd64.deb

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ilogcat-release
          path: |
            code/target/release/ilogcat
            code/ilogcat_${{ steps.version.outputs.version }}_amd64.deb
          retention-days: 30

  create-release:
    runs-on: ubuntu-latest
    name: Create GitHub Release
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ilogcat-release
          path: release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: iLogCat v${{ steps.version.outputs.version }}
          body: |
            ## iLogCat v${{ steps.version.outputs.version }}

            ### Features
            - Multi-tab log windows support
            - SSH remote log viewing with tab completion
            - Command shortcuts sidebar with edit mode toggle
            - Regex filtering support
            - Custom log level keywords
            - Server time sync for SSH logs
            - Docker image available on ghcr.io

            ### Installation

            #### Debian/Ubuntu (.deb package)
            ```bash
            sudo dpkg -i ilogcat_${{ steps.version.outputs.version }}_amd64.deb
            sudo apt-get install -f
            ```

            #### Docker
            ```bash
            docker pull ghcr.io/ayukyo/ilogcat:${{ steps.version.outputs.version }}
            ```

            ### System Requirements
            - Linux (Ubuntu 22.04+, Debian 12+)
            - GTK4 runtime libraries
            - libssh2
          files: |
            release/target/release/ilogcat
            release/ilogcat_${{ steps.version.outputs.version }}_amd64.deb
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    name: Build Docker Image
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/ilogcat:latest
            ghcr.io/${{ github.repository_owner }}/ilogcat:${{ steps.version.outputs.version }}